<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parcel Scanner Configuration</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Specific Layout Presentation Components for Form Setup Panels */
    .setup-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
      border: 1px solid #e2e8f0;
      max-width: 520px;
      margin: 0 auto;
    }

    .setup-banner-icon {
      width: 50px;
      height: 50px;
      background: #eff6ff;
      color: #2563eb;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .setup-title {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .setup-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-wrapper label {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .form-select-control,
    .form-number-control {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      color: #0f172a;
      background-color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-select-control:focus,
    .form-number-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .btn-submit-scanner {
      background: #2563eb;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
      margin-top: 10px;
    }

    .btn-submit-scanner:hover {
      background: #1d4ed8;
    }

    .btn-submit-scanner:active {
      transform: scale(0.99);
    }

    .btn-submit-scanner:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .status-toast-alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 16px;
      display: none;
    }

    .status-toast-alert.success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
  </style>
</head>
<body>

  <div id="sidebar-injector"></div>

  <main class="main-content" id="mainContent">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open Navigation Bar Side Pane">☰</button>
      <div>
        <h1 style="font-size: 22px; font-weight: 700; color: #0f172a;">Parcel Scanner Setup</h1>
        <p style="font-size: 13px; color: #64748b;">Configure tracking profile criteria settings prior to initializing optical modules</p>
      </div>
    </header>

    <div class="setup-card">
      <div class="setup-banner-icon">🚚</div>
      <h2 class="setup-title">Pre-Scan Environment Parameters</h2>
      <p class="setup-subtitle">Select the logistic carrier option and verify expected inbound item metrics to instantiate an active scanning matrix session link.</p>

      <form id="scannerConfigForm">
        <div class="form-stack">
          
          <div class="input-wrapper">
            <label for="courierSelect">Courier Logistic Carrier Name</label>
            <select id="courierSelect" class="form-select-control" required>
              <option value="DHL Express">DHL Express</option>
              <option value="FedEx Routing">FedEx Routing Systems</option>
              <option value="BlueDart Logistics">BlueDart Logistics Hub</option>
              <option value="Delhivery Service">Delhivery Network Operations</option>
              <option value="Self-Collected Target">Internal Courier Dispatch</option>
            </select>
          </div>

          <div class="input-wrapper">
            <label for="expectedCountInput">Expected Batch Package Volume Count</label>
            <input 
              type="number" 
              id="expectedCountInput" 
              class="form-number-control" 
              min="1" 
              max="250" 
              value="1" 
              required
            />
          </div>

          <button type="submit" id="startScanningBtn" class="btn-submit-scanner">
            <span>🔍</span>
            <span id="btnLabel">Initialize Scanner Environment</span>
          </button>

        </div>
      </form>

      <div id="statusAlert" class="status-toast-alert success"></div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app-core.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const configForm = document.getElementById("scannerConfigForm");
      const courierField = document.getElementById("courierSelect");
      const countField = document.getElementById("expectedCountInput");
      const submitBtn = document.getElementById("startScanningBtn");
      const btnLabel = document.getElementById("btnLabel");
      const toastAlert = document.getElementById("statusAlert");

      // Form Submit Workflow Interceptor Pipeline
      configForm.addEventListener("submit", (event) => {
        event.preventDefault(); // Stop native post-back loops

        const selectedCourier = courierField.value;
        const expectedCount = parseInt(countField.value, 10);

        // Sanity constraints verification fallback checks
        if (!selectedCourier || isNaN(expectedCount) || expectedCount < 1) {
          alert("Please verify form input constraints before dispatching runtime links.");
          return;
        }

        // Lock form during redirect handshakes transitions
        submitBtn.disabled = true;
        btnLabel.textContent = "Validating session parameters...";

        // Query our centralized Apps Script Endpoint URL safely from the configuration object map
        const validationEndpoint = APP_API_REGISTRY.parcelScannerSetup;

        // Perform asynchronous registration transaction hook with Google Web App server engines
        fetch(validationEndpoint, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            sessionCourier: selectedCourier,
            allottedBatchLimit: expectedCount,
            creationTimestamp: new Date().toISOString()
          })
        })
        .then(response => {
          // Fallback to local redirection immediately if endpoint lacks programmatic return headers
          if (!response.ok) throw new Error("Endpoint verification skipped. Transitioning to hardware layers.");
          return response.json();
        })
        .catch(error => {
          console.warn("Server validation layer silent fallback initiated:", error.message);
          return { status: "success" }; // Silent bypass ensures field devices function if network drops
        })
        .then(result => {
          // Render confirmation notice before page transitions
          toastAlert.textContent = `Configuration saved: ${selectedCourier}. Launching camera processing frames...`;
          toastAlert.style.display = "block";

          // Forward session tracking context configurations explicitly via encoded query strings parameters
          setTimeout(() => {
            window.location.href = `scanner_camera.html?courier=${encodeURIComponent(selectedCourier)}&count=${expectedCount}`;
          }, 900);
        });
      });

      // Keyboard Shortcut Accessibility: Focus fields automatically on initialization
      courierField.focus();

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          configForm.reset();
          toastAlert.style.display = "none";
        }
      });
    });
  </script>
</body>
</html>
