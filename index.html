<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parcel Management Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }
    .stat-title { font-size: 14px; color: #64748b; font-weight: 600; }
    .stat-val { font-size: 28px; font-weight: 700; color: #0f172a; margin: 8px 0; }
  </style>
</head>
<body>

  <div id="sidebar-injector"></div>

  <main class="main-content" id="mainContent">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div>
        <h1 style="font-size: 22px; font-weight: 700;">Operational Control Center</h1>
        <p style="font-size: 13px; color: #64748b;">Overview metrics and systemic navigation control</p>
      </div>
    </header>

    <div class="dashboard-grid">
      <div class="stat-card">
        <div class="stat-title">Today's Parcels</div>
        <div class="stat-val" id="count-today">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">System Scan Count</div>
        <div class="stat-val" id="count-total">--</div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app-core.js"></script>
  <script>
    console.log("Initialized view using isolated Firebase Project Scope ID:", FIREBASE_CONFIG.projectId);
    document.getElementById('count-today').textContent = "12"; 
    document.getElementById('count-total').textContent = "144";
  </script>
</body>
</html>
