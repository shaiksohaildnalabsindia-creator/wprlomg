<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Barcode Scanner Feed</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Specific Layout Presentation Styles for Live Camera Canvas Interfaces */
    .scanner-workspace {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 992px) {
      .scanner-workspace {
        grid-template-columns: 1fr;
      }
    }

    .video-card {
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #previewVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .laser-scanner-reticle {
      position: absolute;
      top: 25%;
      left: 15%;
      width: 70%;
      height: 50%;
      border: 3px dashed #2563eb;
      border-radius: 8px;
      pointer-events: none;
      box-sizing: border-box;
      z-index: 10;
    }

    .laser-line {
      position: absolute;
      top: 50%;
      left: 5%;
      width: 90%;
      height: 2px;
      background-color: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      animation: laserScan 2s infinite ease-in-out;
    }

    @keyframes laserScan {
      0%, 100% { top: 26%; opacity: 0.3; }
      50% { top: 74%; opacity: 1; }
    }

    .sidebar-panel-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
    }

    .session-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
      background: #f1f5f9;
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .scanned-log-list {
      margin-top: 16px;
      max-height: 240px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item-node {
      padding: 10px 12px;
      background: #f8fafc;
      border-left: 4px solid #10b981;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      font-family: monospace;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    .status-banner-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(15, 23, 42, 0.85);
      color: white;
      padding: 12px;
      font-size: 13px;
      text-align: center;
      z-index: 15;
      backdrop-filter: blur(4px);
    }
  </style>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

  <div id="sidebar-injector"></div>

  <main class="main-content" id="mainContent">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle Navigation Panel">☰</button>
      <div>
        <h1 style="font-size: 22px; font-weight: 700; color: #0f172a;">Live Camera Processing Scan</h1>
        <p style="font-size: 13px; color: #64748b;">Align packaging barcodes within the highlighted screen zone boundaries</p>
      </div>
    </header>

    <div class="scanner-workspace">
      
      <div style="position: relative;">
        <div class="video-card">
          <div class="laser-scanner-reticle">
            <div class="laser-line"></div>
          </div>
